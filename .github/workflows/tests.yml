name: Tests

on:
  push:
  pull_request:
  schedule:
    - cron: '0 0 * * *'

jobs:
  test:
    runs-on: ubuntu-latest
    if: "!contains(github.event.head_commit.message, 'ci skip')"
    strategy:
      fail-fast: false
      matrix:
        php: [ 8.0, 8.1, 8.2, 8.3 ]
        laravel: [ 8.*, 9.*, 10.*, 11.*, 12.*, 13.* ]
        commonmark: [ ^1.5, ^2.0 ]
        dependency-version: [ prefer-lowest, prefer-stable ]
        include:
          - laravel: 8.*
            testbench: ^6.0
          - laravel: 9.*
            testbench: ^7.0
          - laravel: 10.*
            testbench: ^8.0
          - laravel: 11.*
            testbench: ^9.0
          - laravel: 12.*
            testbench: ^10.0
          - laravel: 13.*
            testbench: ^11.0

        exclude:
          # Laravel 8 with commonmark 1 only needs one PHP version
          - laravel: 8.*
            commonmark: ^1.5
            php: 8.1
          - laravel: 8.*
            commonmark: ^1.5
            php: 8.2
          - laravel: 8.*
            commonmark: ^1.5
            php: 8.3

          # Laravel 9+ requires PHP 8.0+, already satisfied by our matrix
          # Laravel 10 requires PHP 8.1+
          - laravel: 10.*
            php: 8.0

          # Laravel 11+ requires PHP 8.2+
          - laravel: 11.*
            php: 8.0
          - laravel: 11.*
            php: 8.1
          - laravel: 12.*
            php: 8.0
          - laravel: 12.*
            php: 8.1
          - laravel: 13.*
            php: 8.0
          - laravel: 13.*
            php: 8.1

          # commonmark 1 is only relevant for older setups; skip for L10+
          - laravel: 10.*
            commonmark: ^1.5
          - laravel: 11.*
            commonmark: ^1.5
          - laravel: 12.*
            commonmark: ^1.5
          - laravel: 13.*
            commonmark: ^1.5

    name: P${{ matrix.php }} - L${{ matrix.laravel }} - C${{ matrix.commonmark }} - ${{ matrix.dependency-version }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: ~/.composer/cache/files
          key: dependencies-laravel-${{ matrix.laravel }}-php-${{ matrix.php }}-composer-${{ hashFiles('composer.json') }}

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, curl, libxml, mbstring, zip, pcntl, pdo, sqlite, pdo_sqlite, bcmath, soap, intl, gd, exif, iconv
          coverage: none

      - name: Install dependencies
        run: |
          composer self-update
          composer require "laravel/framework:${{ matrix.laravel }}" "orchestra/testbench:${{ matrix.testbench }}" "league/commonmark:${{ matrix.commonmark }}" --no-interaction --no-update
          composer update --${{ matrix.dependency-version }} --prefer-dist --no-interaction

      - name: Execute tests
        run: vendor/bin/phpunit
